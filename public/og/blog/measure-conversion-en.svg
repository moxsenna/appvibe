<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.08">
    <path d="M0 80 L1200 80 M0 160 L1200 160 M0 240 L1200 240 M0 320 L1200 320 M0 400 L1200 400 M0 480 L1200 480 M0 560 L1200 560" stroke="#64748B" stroke-width="1"/>
    <path d="M80 0 L80 630 M160 0 L160 630 M240 0 L240 630 M320 0 L320 630 M400 0 L400 630 M480 0 L480 630 M560 0 L560 630 M640 0 L640 630 M720 0 L720 630 M800 0 L800 630 M880 0 L880 630 M960 0 L960 630 M1040 0 L1040 630 M1120 0 L1120 630" stroke="#64748B" stroke-width="1"/>
  </g>

  <!-- Dashboard mockup -->
  <g transform="translate(680, 100)">
    <!-- Main card -->
    <rect x="0" y="0" width="440" height="380" rx="16" fill="#1E293B" stroke="#334155" stroke-width="6"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="440" height="48" rx="16" fill="#334155"/>
    <text x="24" y="32" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#94A3B8">Weekly Dashboard</text>
    
    <!-- Metrics -->
    <rect x="24" y="70" width="190" height="90" rx="10" fill="#0F172A"/>
    <text x="40" y="100" font-family="system-ui,sans-serif" font-size="13" fill="#64748B">WA Clicks</text>
    <text x="40" y="135" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#fff">1,284</text>
    <text x="40" y="155" font-family="system-ui,sans-serif" font-size="12" fill="#22C55E">+18%</text>
    
    <rect x="226" y="70" width="190" height="90" rx="10" fill="#0F172A"/>
    <text x="242" y="100" font-family="system-ui,sans-serif" font-size="13" fill="#64748B">Cost / Lead</text>
    <text x="242" y="135" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#fff">$2.1</text>
    <text x="242" y="155" font-family="system-ui,sans-serif" font-size="12" fill="#22C55E">-12%</text>
    
    <!-- Chart bars -->
    <rect x="40" y="200" width="28" height="120" rx="4" fill="#475569"/>
    <rect x="80" y="170" width="28" height="150" rx="4" fill="#475569"/>
    <rect x="120" y="140" width="28" height="180" rx="4" fill="#22C55E"/>
    <rect x="160" y="160" width="28" height="160" rx="4" fill="#22C55E"/>
    <rect x="200" y="130" width="28" height="190" rx="4" fill="#22C55E"/>
    
    <text x="40" y="340" font-family="system-ui,sans-serif" font-size="12" fill="#64748B">Week 1–5</text>
  </g>

  <!-- Text content -->
  <text x="80" y="110" font-family="system-ui,sans-serif" font-size="18" fill="#64748B">AppVibe Blog</text>
  
  <text x="80" y="200" font-family="system-ui,sans-serif" font-weight="800" font-size="48" fill="#fff">How to Measure Conversion</text>
  <text x="80" y="260" font-family="system-ui,sans-serif" font-weight="600" font-size="26" fill="#94A3B8">Without Expensive Tools</text>

  <!-- Accent line -->
  <rect x="80" y="300" width="120" height="4" rx="2" fill="url(#accent)"/>

  <text x="80" y="380" font-family="system-ui,sans-serif" font-size="20" fill="#64748B">4 Simple Metrics • Google Sheets • Realistic Targets</text>

  <text x="80" y="560" font-family="system-ui,sans-serif" font-size="18" fill="#475569">appvibe.web.id/blog</text>
</svg>
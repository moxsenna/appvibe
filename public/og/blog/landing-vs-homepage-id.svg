<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EF4444"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.08">
    <path d="M0 80 L1200 80 M0 160 L1200 160 M0 240 L1200 240 M0 320 L1200 320 M0 400 L1200 400 M0 480 L1200 480 M0 560 L1200 560" stroke="#64748B" stroke-width="1"/>
    <path d="M80 0 L80 630 M160 0 L160 630 M240 0 L240 630 M320 0 L320 630 M400 0 L400 630 M480 0 L480 630 M560 0 L560 630 M640 0 L640 630 M720 0 L720 630 M800 0 L800 630 M880 0 L880 630 M960 0 L960 630 M1040 0 L1040 630 M1120 0 L1120 630" stroke="#64748B" stroke-width="1"/>
  </g>

  <!-- Two browser windows -->
  <!-- Left: Homepage (faded, red X) -->
  <g transform="translate(80, 120)" opacity="0.35">
    <rect x="0" y="0" width="420" height="320" rx="12" fill="#1E293B" stroke="#334155" stroke-width="6"/>
    <rect x="0" y="0" width="420" height="36" rx="12" fill="#334155"/>
    <text x="24" y="26" font-family="system-ui,sans-serif" font-size="14" fill="#64748B">Homepage</text>
    <rect x="20" y="60" width="380" height="40" rx="6" fill="#475569"/>
    <rect x="20" y="120" width="180" height="32" rx="6" fill="#475569"/>
    <rect x="220" y="120" width="180" height="32" rx="6" fill="#475569"/>
    <rect x="20" y="170" width="380" height="120" rx="6" fill="#475569"/>
    
    <!-- Red X -->
    <circle cx="380" cy="40" r="22" fill="#EF4444"/>
    <path d="M370 30 L390 50 M390 30 L370 50" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Right: Dedicated Landing Page (bright, green check) -->
  <g transform="translate(620, 120)">
    <rect x="0" y="0" width="420" height="320" rx="12" fill="#1E293B" stroke="#22C55E" stroke-width="8"/>
    <rect x="0" y="0" width="420" height="36" rx="12" fill="#166534"/>
    <text x="24" y="26" font-family="system-ui,sans-serif" font-size="14" fill="#4ADE80">Landing Page Khusus</text>
    
    <rect x="20" y="60" width="380" height="40" rx="6" fill="#166534"/>
    <text x="40" y="86" font-family="system-ui,sans-serif" font-size="15" fill="#fff">Konsultasi Jerawat — Hanya Rp299rb</text>
    
    <rect x="20" y="120" width="380" height="140" rx="8" fill="#0F172A"/>
    <text x="40" y="150" font-family="system-ui,sans-serif" font-size="14" fill="#94A3B8">• 3 sesi konsultasi</text>
    <text x="40" y="174" font-family="system-ui,sans-serif" font-size="14" fill="#94A3B8">• Garansi hasil</text>
    <text x="40" y="198" font-family="system-ui,sans-serif" font-size="14" fill="#94A3B8">• Balasan &lt; 30 menit</text>
    
    <!-- Green CTA -->
    <rect x="20" y="280" width="380" height="52" rx="26" fill="url(#accent)"/>
    <text x="210" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#0F172A">Konsultasi via WhatsApp</text>
  </g>

  <!-- Text content -->
  <text x="80" y="110" font-family="system-ui,sans-serif" font-size="18" fill="#64748B">AppVibe Blog</text>
  
  <text x="80" y="520" font-family="system-ui,sans-serif" font-weight="800" font-size="44" fill="#fff">Landing page khusus vs Homepage</text>
  <text x="80" y="570" font-family="system-ui,sans-serif" font-weight="600" font-size="24" fill="#94A3B8">Mana yang benar-benar mengonversi iklan?</text>

  <text x="80" y="620" font-family="system-ui,sans-serif" font-size="18" fill="#475569">appvibe.web.id/blog</text>
</svg>
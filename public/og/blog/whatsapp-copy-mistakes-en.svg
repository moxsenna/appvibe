<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EF4444"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.08">
    <path d="M0 80 L1200 80 M0 160 L1200 160 M0 240 L1200 240 M0 320 L1200 320 M0 400 L1200 400 M0 480 L1200 480 M0 560 L1200 560" stroke="#64748B" stroke-width="1"/>
    <path d="M80 0 L80 630 M160 0 L160 630 M240 0 L240 630 M320 0 L320 630 M400 0 L400 630 M480 0 L480 630 M560 0 L560 630 M640 0 L640 630 M720 0 L720 630 M800 0 L800 630 M880 0 L880 630 M960 0 L960 630 M1040 0 L1040 630 M1120 0 L1120 630" stroke="#64748B" stroke-width="1"/>
  </g>

  <!-- Chat bubbles -->
  <g transform="translate(680, 80)">
    <!-- Bad example -->
    <rect x="0" y="0" width="440" height="200" rx="16" fill="#1E293B" stroke="#334155" stroke-width="4"/>
    <text x="24" y="32" font-family="system-ui,sans-serif" font-size="14" fill="#EF4444">❌ Too long &amp; salesy</text>
    <rect x="24" y="50" width="392" height="130" rx="12" fill="#334155"/>
    <text x="40" y="80" font-family="system-ui,sans-serif" font-size="13" fill="#94A3B8">Hello, this is Healthy Clinic. We are a</text>
    <text x="40" y="100" font-family="system-ui,sans-serif" font-size="13" fill="#94A3B8">specialist skin clinic since 2018 with over</text>
    <text x="40" y="120" font-family="system-ui,sans-serif" font-size="13" fill="#94A3B8">5,000 patients. We have a promo...</text>
    
    <!-- Good example -->
    <rect x="0" y="230" width="440" height="200" rx="16" fill="#1E293B" stroke="#22C55E" stroke-width="4"/>
    <text x="24" y="262" font-family="system-ui,sans-serif" font-size="14" fill="#22C55E">✓ Short &amp; contextual</text>
    <rect x="24" y="280" width="392" height="130" rx="12" fill="#166534"/>
    <text x="40" y="310" font-family="system-ui,sans-serif" font-size="13" fill="#fff">Hi, I saw you asked about acne.</text>
    <text x="40" y="330" font-family="system-ui,sans-serif" font-size="13" fill="#fff">Is there anything I can help explain?</text>
  </g>

  <!-- Text content -->
  <text x="80" y="110" font-family="system-ui,sans-serif" font-size="18" fill="#64748B">AppVibe Blog</text>
  
  <text x="80" y="200" font-family="system-ui,sans-serif" font-weight="800" font-size="48" fill="#fff">5 WhatsApp Copy Mistakes</text>
  <text x="80" y="260" font-family="system-ui,sans-serif" font-weight="600" font-size="26" fill="#94A3B8">That Make Prospects Ghost You Instantly</text>

  <!-- Accent line -->
  <rect x="80" y="300" width="120" height="4" rx="2" fill="url(#accent)"/>

  <text x="80" y="380" font-family="system-ui,sans-serif" font-size="20" fill="#64748B">Bad vs Better Examples • Ready-to-use Templates</text>

  <text x="80" y="560" font-family="system-ui,sans-serif" font-size="18" fill="#475569">appvibe.web.id/blog</text>
</svg>